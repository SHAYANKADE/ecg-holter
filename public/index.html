<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مانیتور زنده ECG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>مانیتور زنده ECG</h1>
      <div class="status-bar">
        <span id="connectionStatus" class="badge badge-off">در انتظار اتصال...</span>
        <span id="leadStatus" class="badge badge-off">وضعیت الکترود: نامشخص</span>
        <span id="deviceId" class="badge badge-neutral">دستگاه: -</span>
      </div>
    </header>

    <main>
      <div class="chart-wrapper">
        <canvas id="ecgChart"></canvas>
      </div>

      <div class="info-panel">
        <div class="info-item">
          <span class="label">نرخ نمونه‌برداری:</span>
          <span id="sampleRate">-</span>
        </div>
        <div class="info-item">
          <span class="label">آخرین به‌روزرسانی:</span>
          <span id="lastUpdate">-</span>
        </div>
        <div class="info-item">
          <span class="label">تعداد نمونه دریافتی (کل):</span>
          <span id="totalSamples">0</span>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
